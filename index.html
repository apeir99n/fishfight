<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="description" content="Fish Fight — a browser fighting game where fish battle on dry land. Unlock characters, skins, and weapons in the arcade ladder." />
  <meta name="theme-color" content="#1a3a5c" />
  <meta property="og:title" content="Fish Fight" />
  <meta property="og:description" content="A browser fighting game where fish battle on dry land." />
  <meta property="og:type" content="website" />
  <title>Fish Fight — fish battle on dry land</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
    }
    #game-container {
      width: 800px;
      height: 450px;
      max-width: 100vw;
    }
    #touch-controls {
      width: 100%;
      max-width: 800px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 12px 12px calc(56px + env(safe-area-inset-bottom, 0px)) 12px;
      gap: 12px;
      flex: 0 0 auto;
    }
    .pad {
      display: grid;
      gap: 16px;
    }
    .pad-left {
      grid-template-columns: repeat(3, 56px);
      grid-template-rows: repeat(2, 56px);
    }
    .pad-right {
      grid-template-columns: repeat(3, 56px);
      grid-template-rows: repeat(2, 56px);
    }
    .tc-btn {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      background: #1a3a5c;
      color: #cfe8ff;
      border: 2px solid #2a5a8c;
      font: bold 18px monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .tc-btn:active, .tc-btn.pressed {
      background: #2a5a8c;
      border-color: #4a8abc;
    }
    @media (hover: hover) and (pointer: fine) {
      #touch-controls { display: none; }
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="touch-controls">
    <div class="pad pad-left">
      <span></span>
      <button class="tc-btn" data-key="ArrowUp" data-code="ArrowUp" data-kc="38" aria-label="Up">▲</button>
      <span></span>
      <button class="tc-btn" data-key="ArrowLeft" data-code="ArrowLeft" data-kc="37" aria-label="Left">◀</button>
      <button class="tc-btn" data-key="ArrowDown" data-code="ArrowDown" data-kc="40" aria-label="Down">▼</button>
      <button class="tc-btn" data-key="ArrowRight" data-code="ArrowRight" data-kc="39" aria-label="Right">▶</button>
    </div>
    <div class="pad pad-right">
      <span></span>
      <button class="tc-btn" data-key="f" data-code="KeyF" data-kc="70">F</button>
      <span></span>
      <button class="tc-btn" data-key="j" data-code="KeyJ" data-kc="74">J</button>
      <button class="tc-btn" data-key="k" data-code="KeyK" data-kc="75">K</button>
      <button class="tc-btn" data-key="l" data-code="KeyL" data-kc="76">L</button>
    </div>
  </div>
  <script>
    (function () {
      const dispatch = (type, key, code, kc) => {
        const ev = new KeyboardEvent(type, {
          key, code, keyCode: kc, which: kc,
          bubbles: true, cancelable: true,
        });
        window.dispatchEvent(ev);
      };
      document.querySelectorAll('.tc-btn').forEach((btn) => {
        const key = btn.dataset.key;
        const code = btn.dataset.code;
        const kc = parseInt(btn.dataset.kc, 10);
        let pressed = false;
        const press = (e) => {
          e.preventDefault();
          if (pressed) return;
          pressed = true;
          btn.classList.add('pressed');
          dispatch('keydown', key, code, kc);
        };
        const release = (e) => {
          if (e) e.preventDefault();
          if (!pressed) return;
          pressed = false;
          btn.classList.remove('pressed');
          dispatch('keyup', key, code, kc);
        };
        btn.addEventListener('touchstart', press, { passive: false });
        btn.addEventListener('touchend', release, { passive: false });
        btn.addEventListener('touchcancel', release, { passive: false });
        btn.addEventListener('mousedown', press);
        btn.addEventListener('mouseup', release);
        btn.addEventListener('mouseleave', release);
      });
    })();
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
